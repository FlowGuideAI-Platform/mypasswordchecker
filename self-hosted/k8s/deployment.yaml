apiVersion: apps/v1
kind: Deployment
metadata:
  name: mypasswordchecker-api
  namespace: mypasswordchecker
  labels:
    app: mypasswordchecker-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mypasswordchecker-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mypasswordchecker-api
        version: v1
    spec:
      # Security context (SOC 2 requirement)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: api
        image: mypasswordchecker/self-hosted:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: mypasswordchecker-config

        # Sensitive environment variables from Secret
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mypasswordchecker-secrets
              key: jwt-secret
        - name: DATABASE_URL
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/mypasswordchecker"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mypasswordchecker-secrets
              key: postgres-password
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mypasswordchecker-secrets
              key: redis-password
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mypasswordchecker-secrets
              key: stripe-secret-key
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: mypasswordchecker-secrets
              key: stripe-webhook-secret

        # Resource limits (SOC 2 requirement)
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Health checks (Kubernetes liveness/readiness probes)
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Container security (SOC 2 requirement)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL

        # Temporary writable directories
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mypasswordchecker-api
              topologyKey: kubernetes.io/hostname

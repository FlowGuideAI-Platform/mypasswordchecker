apiVersion: v1
kind: Secret
metadata:
  name: mypasswordchecker-secrets
  namespace: mypasswordchecker
type: Opaque
stringData:
  # IMPORTANT: Replace these values with actual secrets
  # In production, use sealed-secrets, external-secrets, or your cloud provider's secret manager
  jwt-secret: "CHANGE_THIS_TO_RANDOM_STRING_IN_PRODUCTION"
  postgres-password: "CHANGE_THIS_IN_PRODUCTION"
  redis-password: "CHANGE_THIS_IN_PRODUCTION"
  stripe-secret-key: "sk_live_your_key_here"
  stripe-webhook-secret: "whsec_your_webhook_secret_here"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mypasswordchecker-config
  namespace: mypasswordchecker
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: "https://yourdomain.com,https://www.yourdomain.com"
  DOMAIN: "https://yourdomain.com"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

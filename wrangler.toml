name = "mypasswordchecker-api"
main = "workers/mypasswordchecker-api.js"
compatibility_date = "2024-10-11"
compatibility_flags = ["nodejs_compat"]
account_id = "be1ad24bfb43615483c3a472aa134892"

# D1 Database (primary data store - SOC 2 compliant)
[[d1_databases]]
binding = "DB"
database_name = "mypasswordchecker-db"
database_id = "9fbf81b9-50ad-4515-a40f-b94f78dd56fd"

# R2 Bucket (audit log storage - 7 year retention)
[[r2_buckets]]
binding = "AUDIT_LOGS"
bucket_name = "mypasswordchecker-audit-logs"

# KV Namespaces (caching only - migrating away from KV for primary storage)
[[kv_namespaces]]
binding = "API_KEYS"
id = "51ae7a6e8bf84e1a8f6d94b630a7f30d"

[[kv_namespaces]]
binding = "USAGE_TRACKING"
id = "345ef42a47164293bf9bfd0779da5e5d"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "8c1d651ce8cc4e87a4f30912e0d52ddb"

# Environment variables (set via wrangler secret put)
[vars]
DOMAIN = "https://mypasswordchecker.com"
STRIPE_ENVIRONMENT = "production"
PAYPAL_ENVIRONMENT = "production"
TIER1_FREE_QUOTA = "25"
TIER1_PAID_PRICE = "1900"
TIER1_PAID_QUOTA = "3000"
TIER1_QUANTUM_MONTHLY_QUOTA = "15000"
TIER1_OVERAGE_PRICE = "9"
TIER2_PER_REQUEST_PRICE = "100"
TIER2_MONTHLY_PRICE = "15000"
TIER2_MONTHLY_QUOTA = "1500"
TIER2_OVERAGE_PRICE = "9"

# Secrets (set separately via Cloudflare dashboard or wrangler secret put)
# STRIPE_SECRET_KEY = "sk_live_..."
# STRIPE_SANDBOX_SECRET_KEY = "sk_test_..."
# STRIPE_PUBLISHABLE_KEY = "pk_live_..."
# STRIPE_SANDBOX_PUBLISHABLE_KEY = "pk_test_..."
# STRIPE_WEBHOOK_SECRET = "whsec_..."

# Routes - Main domain (API only)
[[routes]]
pattern = "mypasswordchecker.com/api/*"
zone_name = "mypasswordchecker.com"

[[routes]]
pattern = "www.mypasswordchecker.com/api/*"
zone_name = "mypasswordchecker.com"

# Routes - Alternate domains (redirect all traffic)
[[routes]]
pattern = "mypasswordcheck.com/*"
zone_name = "mypasswordcheck.com"

[[routes]]
pattern = "www.mypasswordcheck.com/*"
zone_name = "mypasswordcheck.com"

[[routes]]
pattern = "myquantumpasswordchecker.com/*"
zone_name = "myquantumpasswordchecker.com"

[[routes]]
pattern = "www.myquantumpasswordchecker.com/*"
zone_name = "myquantumpasswordchecker.com"

[[routes]]
pattern = "quantumpasswordchecker.com/*"
zone_name = "quantumpasswordchecker.com"

[[routes]]
pattern = "www.quantumpasswordchecker.com/*"
zone_name = "quantumpasswordchecker.com"

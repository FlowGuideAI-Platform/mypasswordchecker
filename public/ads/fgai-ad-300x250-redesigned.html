<script>
const DOCS=[
  {label:'Compliance docs',atty:false},
  {label:'HR docs',atty:false},
  {label:'Operations docs',atty:false},
  {label:'IT docs',atty:false},
  {label:'Finance docs',atty:false},
  {label:'Legal docs',atty:true}
];
const AIS=[
  {label:'Claude',    dot:'#1D9E75',soon:false},
  {label:'ChatGPT',   dot:'#7F77DD',soon:true},
  {label:'Gemini',    dot:'#378ADD',soon:true},
  {label:'Perplexity',dot:'#FF6B35',soon:true}
];
let di=0,ai=0;
const dtW=document.getElementById('dt-wrap');
const dtE=document.getElementById('doc-type');
const atE=document.getElementById('atty');
const aiW=document.getElementById('ai-wrap');
const aiD=document.getElementById('ai-dot');
const aiN=document.getElementById('ai-name');
const aiS=document.getElementById('ai-soon');
function slide(el,cb){
  el.style.opacity='0';el.style.transform='translateY(-8px)';
  setTimeout(()=>{
    cb();
    el.style.transition='none';
    el.style.transform='translateY(8px)';el.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition='opacity 0.32s ease,transform 0.32s ease';
      el.style.transform='translateY(0)';el.style.opacity='1';
    }));
  },340);
}
setInterval(()=>slide(dtW,()=>{
  di=(di+1)%DOCS.length;
  dtE.textContent=DOCS[di].label;
  atE.style.display=DOCS[di].atty?'flex':'none';
}),3000);
setTimeout(()=>setInterval(()=>slide(aiW,()=>{
  ai=(ai+1)%AIS.length;
  const p=AIS[ai];
  aiN.textContent=p.label;
  aiD.style.background=p.dot;
  aiS.textContent=p.soon?' · soon':'';
  aiS.style.display=p.soon?'inline':'none';
}),4000),1500);
</script>
<!-- Click tracking — privacy-respecting, no PII -->
<script>
(function () {
  var BANNER_ID = 'flowguideai';
  function uaType() {
    var ua = navigator.userAgent;
    if (/bot|crawler|spider|scraper/i.test(ua)) return 'bot';
    if (/iPad|tablet/i.test(ua)) return 'tablet';
    if (/Mobile|Android|iPhone|iPod/i.test(ua)) return 'mobile';
    return 'desktop';
  }
  function ctx() {
    var c = { source: 'unknown', timeOnSite: null, placement: 'unknown' };
    try {
      c.source = parent.sessionStorage.getItem('mpc_traffic_source') || 'unknown';
      var t = parent.sessionStorage.getItem('mpc_traffic_source_time');
      if (t) c.timeOnSite = Math.floor((Date.now() - new Date(t).getTime()) / 1000);
      var p = parent.location.pathname.replace(/^\/+|\/+$/g, '');
      c.placement = (p === '' || p === 'index') ? 'homepage' : p;
    } catch (e) {}
    return c;
  }
  function track(bannerId, anchor) {
    var c = ctx();
    try {
      var payload = {
        banner_id: bannerId, placement: c.placement,
        timestamp: new Date().toISOString(), user_agent_type: uaType(),
        traffic_source: c.source, time_on_site: c.timeOnSite
      };
      navigator.sendBeacon('/api/track-click',
        new Blob([JSON.stringify(payload)], { type: 'application/json' }));
    } catch (e) {}
    // Carry the visitor origin to the destination for downstream attribution.
    if (anchor && c.source && c.source !== 'unknown' && anchor.href.indexOf('utm_term=') === -1) {
      anchor.href += '&utm_term=' + encodeURIComponent(c.source);
    }
  }
  var links = document.querySelectorAll('a[href]');
  for (var i = 0; i < links.length; i++) {
    (function (a) { a.addEventListener('click', function () { track(BANNER_ID, a); }); })(links[i]);
  }
})();
</script>

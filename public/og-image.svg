<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Lock icon -->
  <text x="600" y="240" font-size="120" text-anchor="middle" fill="white">🔐</text>

  <!-- Main title -->
  <text x="600" y="360" font-size="64" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    MyPasswordChecker.com
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">
    Password Strength &amp; Quantum Resistance
  </text>

  <!-- Features -->
  <text x="600" y="490" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">
    ✓ Free Tool   ✓ Privacy-Focused   ✓ API Available
  </text>

  <!-- Bottom badge -->
  <rect x="450" y="530" width="300" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
  <text x="600" y="563" font-size="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    Client-Side Processing
  </text>
</svg>

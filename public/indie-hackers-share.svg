<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGradient)"/>

  <!-- Lock icon (larger for square format) -->
  <text x="400" y="280" font-size="160" text-anchor="middle" fill="white">🔐</text>

  <!-- Main title -->
  <text x="400" y="450" font-size="56" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    MyPasswordChecker
  </text>

  <!-- .com -->
  <text x="400" y="510" font-size="48" font-weight="bold" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">
    .com
  </text>

  <!-- Subtitle -->
  <text x="400" y="590" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif">
    Password Strength
  </text>
  <text x="400" y="630" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif">
    + Quantum Resistance
  </text>

  <!-- Bottom badge -->
  <rect x="250" y="700" width="300" height="60" rx="30" fill="rgba(255,255,255,0.2)"/>
  <text x="400" y="740" font-size="24" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="600">
    Free Privacy Tool
  </text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPasswordChecker - 320x50 Mobile Ad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        .ad-container {
            width: 320px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            color: white;
            cursor: pointer;
        }
        .ad-container:active {
            transform: scale(0.98);
        }
        .left-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .shield-icon {
            font-size: 28px;
        }
        .text-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .headline {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
        }
        .subheadline {
            font-size: 10px;
            opacity: 0.95;
        }
        .cta-button {
            background: white;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 11px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <a href="https://mypasswordchecker.com?utm_source=mobile&utm_medium=banner&utm_campaign=320x50" target="_blank" style="text-decoration: none;">
        <div class="ad-container">
            <div class="left-section">
                <div class="shield-icon">🔐</div>
                <div class="text-content">
                    <div class="headline">Password Safe?</div>
                    <div class="subheadline">Free strength test</div>
                </div>
            </div>
            <button class="cta-button">Test →</button>
        </div>
    </a>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGradient)"/>

  <!-- Shield Shape -->
  <path d="M200 80 L280 110 L280 200 Q280 260 200 310 Q120 260 120 200 L120 110 Z"
        fill="url(#shieldGradient)"
        stroke="#667eea"
        stroke-width="4"/>

  <!-- Checkmark -->
  <path d="M160 200 L185 230 L245 160"
        fill="none"
        stroke="#667eea"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Lock Keyhole -->
  <circle cx="200" cy="240" r="8" fill="#667eea"/>
  <rect x="196" y="240" width="8" height="20" rx="2" fill="#667eea"/>
</svg>
